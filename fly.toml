# Oak — single always-on machine, unmanaged Fly Postgres, region iad.
app = "oak-gowtam"
primary_region = "iad"

# Cheap OOM insurance: Linux swap so a brief spike (Next SSR + Anthropic stream +
# pg pool) doesn't OOM-kill the single machine. Lives on rootfs; no extra cost.
swap_size_mb = 512

[build]
  dockerfile = "Dockerfile"

# Apply committed Drizzle migrations before each new release serves traffic. Runs
# in an ephemeral machine off the SAME image, with the attach-set DATABASE_URL and
# private-network access to the PG app. A failed migration ABORTS the deploy.
# migrate.mjs is plain ESM and does NOT import src/env.ts, so it needs only
# DATABASE_URL (no ANTHROPIC_API_KEY / AUTH_SECRET).
[deploy]
  release_command = "node migrate.mjs"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  # Always-on: never stop, never autoscale, keep exactly one machine.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  # SSE chat streams are long-lived single connections; count load by connection so
  # a streaming request isn't mis-measured. With one always-on machine and no
  # autoscaling these are just a safety cap, set generously for a single-user app.
  [http_service.concurrency]
    type = "connections"
    soft_limit = 20
    hard_limit = 25

  # Liveness probe hits the no-DB /api/health route so a transient DB blip can never
  # fail the check and restart the machine (which would wipe in-memory guest state).
  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
